<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Routes | KMB Tracker</title>
    <link rel="stylesheet" href="search.css">
</head>
<body>
    <header class="main-header">
        <div class="navbar">
            <div class="logo">KMB TRACKER</div>
            <div id="clock" style="color: white; font-weight: bold; font-family: 'Consolas', monospace; font-size: 1.1em;"></div>
            <nav>
                <a href="home.html" class="nav-link">Home</a>
                <a href="search.html" class="nav-link active">Search</a>
                <a href="watchlist.html" class="nav-link">Watchlist</a>
            </nav>
        </div>
    </header>

    <main class="search-page-container">
        <section class="search-hero-box">
            <div class="hero-inner">
                <h1>Explore Destinations</h1>
                <p>Real-time bus data at your fingertips</p>
                
                <div class="search-bar-container">
                    <div class="search-input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input 
                            type="text" 
                            id="routeInput" 
                            list="destinationList" 
                            placeholder="Select or Type Route (e.g., N271)..."
                            autocomplete="off"
                        >
                    </div>
                    <button id="searchBtn" class="search-button">Search</button>
                    
                    <datalist id="destinationList">
                        <option value="N271">Hung Hom (Night)</option>
                        <option value="N216">Yau Tong (Night)</option>
                        <option value="1A">Tsim Sha Tsui</option>
                        </datalist>
                </div>

                <div class="popular-chips">
                    <span>Try searching:</span>
                    <button class="chip" onclick="fillAndSearch('1A')">1A</button>
                    <button class="chip" onclick="fillAndSearch('N271')">N271</button>
                    <button class="chip" onclick="fillAndSearch('960')">960</button>
                </div>
            </div>
        </section>

        <div id="resultsContainer" class="results-area">
            </div>
    </main>

    <script src="search.js"></script>
</body>
</html>
