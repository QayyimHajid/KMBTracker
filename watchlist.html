<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Watchlist | KMB Tracker</title>
  <link rel="stylesheet" href="watchlist.css" />
</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">KMB TRACKER</div>
      <nav>
        <a href="home.html" class="nav-link">Home</a>
        <a href="search.html" class="nav-link">Search</a>
        <a href="watchlist.html" class="nav-link active">Watchlist</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="watchlist-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-top: 20px;">
      <h2 class="section-title">Saved Bus Routes</h2>
      <button id="refreshBtn" class="genre-btn" style="background: #3DBD7A; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">
        🔄 Refresh List
      </button>
    </div>

    <div id="bookmarksList" class="bookmarks-list">
        </div>

    <p id="emptyMsg" class="no-bookmarks" style="display:none; text-align: center; margin-top: 50px; color: #666;">
        No routes in your watchlist yet. Start by searching for a route!
    </p>
  </main>

  <script src="watchlist.js"></script>
</body>
</html>
